name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/ -q --tb=short

      - name: Check for duplicate function definitions
        run: |
          python - <<'EOF'
          import ast, sys, pathlib, collections
          errors = []
          for py_file in pathlib.Path('.').rglob('*.py'):
              try:
                  tree = ast.parse(py_file.read_text())
              except SyntaxError:
                  continue
              names = [n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)]
              for name, count in collections.Counter(names).items():
                  if count > 1:
                      errors.append(f"{py_file}: '{name}' defined {count} times")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('No duplicate function definitions found.')
          EOF
