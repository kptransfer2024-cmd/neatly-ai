version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neatly-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./neatly.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEBUG=true
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    volumes:
      - ./neatly.db:/app/neatly.db
      - ./__pycache__:/app/__pycache__
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: neatly-dashboard
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - api
    volumes:
      - ./__pycache__:/app/__pycache__
    command: streamlit run src/dashboard/streamlit_app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  neatly_db:
